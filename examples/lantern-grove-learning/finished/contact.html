<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Contact | Lantern Grove Home Learning</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <a class="skip-link" href="#main-content">Skip to main content</a>
        <header class="site-header">
            <p class="brand">Lantern Grove Home Learning</p>
            <nav aria-label="Primary navigation">
                <a href="index.html">Home</a>
                <a aria-current="page" href="contact.html">Contact</a>
            </nav>
        </header>

        <main id="main-content">
            <section aria-labelledby="contact-heading">
                <h1 id="contact-heading">Ask a learning question</h1>
                <p>
                    This demonstration form shows front-end behavior only. It
                    does not send or permanently save information.
                </p>
                <button
                    id="form-button"
                    type="button"
                    aria-expanded="false"
                    aria-controls="contact-form"
                >
                    Show contact form
                </button>
                <form id="contact-form" class="contact-form" hidden>
                    <label for="name">Name</label>
                    <input
                        id="name"
                        name="name"
                        type="text"
                        autocomplete="name"
                        required
                    />

                    <label for="email">Email</label>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        autocomplete="email"
                        required
                    />

                    <label for="message">Learning question</label>
                    <textarea id="message" name="message" rows="4"></textarea>

                    <button type="submit">Enter demonstration request</button>
                </form>
                <p id="form-message" role="status"></p>
            </section>
        </main>

        <footer>
            <p>&copy; <span id="year"></span> Lantern Grove Home Learning</p>
        </footer>
        <script src="script.js"></script>
    </body>
</html>
