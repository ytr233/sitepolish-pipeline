name: SitePolish quality gate

on:
    push:
        branches: ["main"]
    pull_request:

jobs:
    quality:
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install exact dependencies
              run: npm ci

            - name: Run engine and example checks
              run: npm run quality
